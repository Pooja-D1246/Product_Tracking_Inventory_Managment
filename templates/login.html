<!DOCTYPE html>
<html>
<head>
    <title>Apptmyz Inventory System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-page">

<div class="login-container">

    <div class="logo-section">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Apptmyz Logo">
        <h1>Inventory Management System</h1>
        <p>Logistics & Supply Chain Dashboard</p>
    </div>

    <form action="{{ url_for('handle_login') }}" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
